<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Portfolio Analyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            animation: {
              marquee: 'marquee 30s linear infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(100vw)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            },
            colors: {
              gray: {
                900: '#0f1115', // Bloomberg/Moneycontrol deep dark
                800: '#1a1d24',
                700: '#262a33',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f1115;
        color: #e2e8f0;
      }
      /* Custom scrollbar for data density */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f1115;
      }
      ::-webkit-scrollbar-thumb {
        background: #262a33;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f4452;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-gray-200 antialiased font-sans selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
